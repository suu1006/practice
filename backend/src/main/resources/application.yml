spring:
  application:
    name: credit-report
  datasource:
    url: jdbc:h2:mem:credit-report;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    issuer: kcs-credit-report
    access-token-expiration-minutes: 30
    refresh-token-expiration-days: 14
    secret: change-me-to-a-strong-local-secret-before-review
  cors:
    allowed-origins:
      - http://localhost:3000
